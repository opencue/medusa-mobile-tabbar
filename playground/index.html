<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>medusa-mobile-tabbar · playground</title>
    <!--
      No Tailwind here on purpose: the bar ships its own styles, so this proves
      it renders fully styled with zero Tailwind. The only app-side rule is icon
      sizing (the consumer owns icon size), done in plain CSS below.
    -->
    <style>
      body { margin: 0; background: #0b0b0d; color: #e7e7ea; -webkit-font-smoothing: antialiased; }
      .mtb-icon svg { width: 22px; height: 22px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
